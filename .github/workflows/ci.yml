name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx astro sync

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Bundle size check (dry-run)
        # Validates the bundle against Cloudflare's limits without uploading.
        run: npx wrangler deploy --config dist/server/wrangler.json --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 1

  # Only runs on push to main — not on PRs.
  # Fork PRs do NOT inherit Cloudflare Secrets — auth will fail silently in fork PR previews (expected).
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy health check
        run: |
          DEPLOY_URL="https://urlopy.oliwa-bartosz.workers.dev"
          echo "Health check: ${DEPLOY_URL}/auth/signin"
          HTTP_CODE=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            --max-time 30 --retry 3 --retry-delay 5 \
            "${DEPLOY_URL}/auth/signin")
          if [ "$HTTP_CODE" -ge 500 ]; then
            echo "FAIL: HTTP ${HTTP_CODE}"
            cat /tmp/body.txt
            exit 1
          fi
          if ! grep -qi "sign.in\|email\|login" /tmp/body.txt; then
            echo "FAIL: response does not look like an auth page"
            cat /tmp/body.txt
            exit 1
          fi
          echo "OK: HTTP ${HTTP_CODE}"
