# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Eval harness for the PR-review agent (packages/code-reviewer).
#
# Runs the production `reviewPr` path (via evals/providers/pr-review.ts) across
# three OpenRouter models against a seeded-flaw fixture, then judges each review
# per planted flaw (LLM rubric) plus deterministic checks. Everything runs on
# the single OPENROUTER_API_KEY in the package's .env.
#
# Run:  npm run eval        (from packages/code-reviewer/)
# View: npm run eval:view
#
# The single test case is the react-16-to-19-migration seeded-flaw fixture.
# Each review is judged per planted flaw (three llm-rubric assertions graded by
# the OpenRouter Sonnet override below) plus two deterministic checks
# (evals/asserts/deterministic.ts): that the production verdict is "failed" and
# that the six scores are well-formed integers.

description: "PR-review agent: 3-model comparison on seeded-flaw fixtures"

# Vestigial prompt: the custom provider ignores promptfoo's rendered prompt and
# builds its own via buildPrReviewPrompt from the test vars. promptfoo's schema
# still requires at least one prompt entry.
prompts:
  - "Review PR: {{title}}"

# Same provider file, three model configs — "same prompt, three models" as three
# entries over one test case. Labels are the model ids so the matrix is
# self-describing.
providers:
  - id: file://providers/pr-review.ts
    label: z-ai/glm-5.1
    config:
      model: z-ai/glm-5.1
  - id: file://providers/pr-review.ts
    label: deepseek/deepseek-v4-flash
    config:
      model: deepseek/deepseek-v4-flash
  - id: file://providers/pr-review.ts
    label: deepseek/deepseek-v4-pro
    config:
      model: deepseek/deepseek-v4-pro

# Grade every model-graded assertion (llm-rubric) through OpenRouter, not the
# default OpenAI grader — otherwise the run silently demands OPENAI_API_KEY.
# Sonnet is stronger than and distinct from all three systems under test.
defaultTest:
  options:
    provider: openrouter:anthropic/claude-sonnet-5

tests:
  # The seeded-flaw fixture: a React 16 -> 19 class-to-function migration that is
  # mostly correct and idiomatic, with three impactful bugs planted (see
  # fixtures/react-16-to-19-migration/ground-truth.md). The title/description are
  # a plausible, confident PR submission that does NOT hint at the flaws — this
  # is the untrusted-content framing the reviewer must see through.
  #
  # `truncated` is intentionally NOT a var: the provider derives it by running
  # the diff through the production `truncateDiff`, mirroring the CLI.
  #
  # Assertions are split by nature: three per-flaw llm-rubric checks (one per
  # planted flaw, graded by the defaultTest Sonnet override) plus two
  # deterministic javascript checks. Each rubric names exactly one flaw so the
  # matrix shows per-flaw detection per model; the rubric text paraphrases
  # fixtures/react-16-to-19-migration/ground-truth.md — keep them in sync.
  - description: "react-16-to-19-migration: three seeded flaws in a plausible migration"
    vars:
      title: "Modernize LeaveRequestsPanel: migrate to a function component for React 19"
      description: |
        Converts LeaveRequestsPanel from a legacy class component to a function
        component with hooks as part of the React 19 upgrade. Lifecycle methods
        map to useEffect, class state to useState, and the context read to
        useContext. Also switches the island entry point from the deprecated
        ReactDOM.render to createRoot. Behavior is unchanged; polling, the leave
        events subscription, and the filtered view all carry over.
      diff: file://fixtures/react-16-to-19-migration/pr.diff
    assert:
      # Flaw 1 — stale-closure poll interval (ground-truth.md § Flaw 1)
      - type: llm-rubric
        value: >
          The review identifies that the polling useEffect reads `requests` from
          a stale closure — the effect has an empty dependency array `[]` and
          calls `setRequests(mergeById(requests, incoming))` using the captured
          initial `requests` instead of a functional update, so each poll merges
          against a frozen (empty) base and drops rows between polls. Pass only
          if a finding or the summary concretely describes this stale-closure /
          missing-functional-update mechanism or its data-loss symptom; a vague
          mention of "possible hook/closure issues" without naming the polling
          effect does not pass.
      # Flaw 2 — dropped cleanup leaks subscription / set-state after unmount (ground-truth.md § Flaw 2)
      - type: llm-rubric
        value: >
          The review identifies that the load-and-subscribe useEffect never
          cleans up: it calls `leaveEvents.subscribe(loadRequests)` but discards
          the returned unsubscribe handle and returns no cleanup function, so the
          subscription leaks across mounts and an async fetch can call a state
          setter after unmount. Pass only if a finding or the summary concretely
          describes the missing cleanup / unsubscribe (or the resulting leak /
          set-state-after-unmount); a generic "add cleanups to effects" remark
          that does not tie to the subscription does not pass.
      # Flaw 3 — inline object in dependency array → infinite render loop (ground-truth.md § Flaw 3)
      - type: llm-rubric
        value: >
          The review identifies that the derived-view useEffect has an inline
          object literal `{ status: statusFilter }` in its dependency array,
          which allocates a new reference every render, so the effect (which
          calls `setVisibleRequests`) re-runs after every commit — an infinite
          render loop / "Maximum update depth exceeded". Pass only if a finding
          or the summary concretely describes the unstable object dependency and
          the resulting re-render loop; merely noting the effect could be a
          useMemo without identifying the loop cause does not pass.
      # Deterministic: the production verdict must be "failed" for this PR.
      - type: javascript
        value: file://asserts/deterministic.ts:verdictFailed
      # Deterministic: all six criterion scores are integers within 1–10.
      - type: javascript
        value: file://asserts/deterministic.ts:scoresWellFormed
